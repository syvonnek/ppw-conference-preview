<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Who Attends — 10 more options</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"><style>
:root{--bg:#080b12;--ink:#eef2fb;--dim:#a3b2d2;--faint:#6b7b9e;--line:#212d49;--cyan:#2dd4ff}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:"Poppins",sans-serif}
.head{max-width:1180px;margin:0 auto;padding:44px 22px 10px;text-align:center}
h1{font-size:clamp(23px,3.2vw,30px);font-weight:800;margin:0 0 8px}.head p{color:var(--dim);font-size:14.5px;margin:0 auto 4px;max-width:680px;line-height:1.6}.head .ask{color:var(--cyan);font-weight:600;margin-top:10px}
.nav{position:sticky;top:0;z-index:50;background:rgba(8,11,18,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:11px 18px;display:flex;gap:7px;flex-wrap:wrap;justify-content:center}
.nav a{color:var(--dim);text-decoration:none;font-size:12.5px;font-weight:600;border:1px solid var(--line);border-radius:999px;padding:5px 13px}.nav a:hover{color:var(--cyan);border-color:var(--cyan)}
.opt{position:relative;overflow:hidden;border-top:1px solid var(--line)}
.opt .bg{position:absolute;inset:0;background-size:cover;background-position:center 42%}
.opt .sc{position:absolute;inset:0;background:linear-gradient(180deg,rgba(12,18,32,.90),rgba(12,18,32,.84) 45%,rgba(12,18,32,.93))}
.opt .inner{position:relative;max-width:1180px;margin:0 auto;padding:66px 22px 82px}
.tag{display:inline-block;background:var(--cyan);color:#04121a;font-weight:800;font-size:13px;letter-spacing:.6px;text-transform:uppercase;padding:7px 16px;border-radius:8px;margin-bottom:28px}
.kick{color:var(--cyan);font-size:12px;letter-spacing:3px;text-transform:uppercase;font-weight:700;text-align:center}
.ttl{font-size:clamp(26px,4vw,38px);font-weight:800;text-align:center;margin:8px 0 12px;letter-spacing:-.5px}
.sub{color:var(--dim);text-align:center;max-width:600px;margin:0 auto 40px;font-size:15px;line-height:1.55}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}@media(max-width:900px){.grid{grid-template-columns:1fr}}
.card{background:rgba(18,27,47,.55);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:30px 24px;text-align:center;display:flex;flex-direction:column;align-items:center}
.ibox{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;font-size:22px}
.card h4{margin:0 0 8px;font-size:17px;font-weight:700}.card p{margin:0;color:var(--dim);font-size:13.5px;line-height:1.55}
.foot{max-width:1180px;margin:0 auto;padding:44px 22px 90px;color:var(--faint);font-size:13px;text-align:center}</style></head><body>
<div class="head"><h1>"Who Attends" — 10 more options</h1>
<p>A fresh set from your full Pixieset gallery. <b>★</b> marks the engaged-instructor-near-the-screen shots you asked for (M4, M5, M10).</p>
<p class="ask">Reply with the number(s) you like — you can keep the earlier A/B/C too.</p></div>
<div class="nav" id="nav"></div><div id="out"></div>
<div class="foot">Post&#124;Production World &middot; Who Attends &mdash; more options</div>
<script>
var opts=[["M1", "Instructor at screen, purple stage"], ["M2", "Engaged audience, close-up rows"], ["M3", "Instructor at podium + NAB banner"], ["M4", "Instructor gesturing near the screen \u2605"], ["M5", "Animated speaker on stage + audience"], ["M6", "Massive packed room"], ["M7", "Hands-on demo table"], ["M8", "Instructor presenting to full room"], ["M9", "NAB stage, engaged classroom rows"], ["M10", "Instructor mid-gesture near screen \u2605"]];
var cards=[['🎬','#3aa6ff','Editors & Post Pros','Video editors, colorists, and finishing artists working across film, TV, and streaming.'],['✦','#a78bfa','Motion & VFX Artists','Motion graphics designers and VFX creatives building for broadcast and brands.'],['🎥','#fb923c','Producers & DPs','Producers, directors, and cinematographers in broadcast, corporate, and field production.'],['✨','#2dd4bf','AI Creatives','The fast-growing audience adopting generative and AI-assisted production workflows.'],['📱','#f472b6','Content Creators','Social-first and corporate creators scaling output across every platform.'],['🏢','#f6cf6a','Corporate Video Teams','In-house media teams producing at volume for global organizations.']];
var nav='',out='';
opts.forEach(function(o,i){var n=i+1;nav+='<a href="#'+o[0]+'">'+o[0]+'</a>';var c='';cards.forEach(function(k){c+='<div class="card"><div class="ibox" style="background:'+k[1]+'22;color:'+k[1]+'">'+k[0]+'</div><h4>'+k[2]+'</h4><p>'+k[3]+'</p></div>';});
out+='<section class="opt" id="'+o[0]+'"><div class="bg" style="background-image:url(ppw-assets/who-more/m'+n+'.webp)"></div><div class="sc"></div><div class="inner"><div style="text-align:center"><span class="tag">'+o[0]+' &mdash; '+o[1]+'</span></div><div class="kick">Conference attendees</div><div class="ttl">Who Attends PPW</div><p class="sub">The editors, artists, producers, and creators who shape what the industry makes &mdash; and who come to PPW to sharpen their craft.</p><div class="grid">'+c+'</div></div></section>';});
document.getElementById('nav').innerHTML=nav;document.getElementById('out').innerHTML=out;
</script></body></html>
